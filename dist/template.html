<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mono_dashboard // template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mono-dashboard.css">
</head>
<body>
    <div id="dashboard"></div>

    <script type="module">
        import { MonoDashboard } from './mono-dashboard.js';

        // Your data here
        const data = [
            { name: "item-1", total: 1000, input: 500, output: 200 },
            { name: "item-2", total: 800, input: 400, output: 150 },
            { name: "item-3", total: 600, input: 300, output: 100 }
        ];

        const grandTotal = data.reduce((sum, d) => sum + d.total, 0);

        const dashboard = new MonoDashboard({
            title: 'dashboard',
            subtitle: 'analytics overview',
            stats: [
                { label: 'total', value: grandTotal, accent: true },
                { label: 'items', value: data.length }
            ],
            data: data,
            container: '#dashboard'
        });

        dashboard.render();
    </script>
</body>
</html>
